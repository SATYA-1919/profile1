<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1550" viewBox="0 0 1200 1550">
  <rect width="1200" height="1550" fill="#f7f4ee"/>
  <rect x="72" y="72" width="1056" height="1406" rx="18" fill="#fffdf8" stroke="#d9d2c5" stroke-width="3"/>
  <rect x="72" y="72" width="1056" height="132" rx="18" fill="#111"/>
  <text x="118" y="132" fill="#e50914" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Mahindra University</text>
  <text x="118" y="174" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="24">School of Management</text>
  <text x="118" y="292" fill="#111" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700">Recommendation Letter</text>
  <text x="118" y="346" fill="#555" font-family="Arial, Helvetica, sans-serif" font-size="28">For Swe Ching Maio</text>
  <line x1="118" y1="406" x2="1082" y2="406" stroke="#e7ded0" stroke-width="3"/>
  <text x="118" y="500" fill="#222" font-family="Georgia, 'Times New Roman', serif" font-size="34">To Whom It May Concern,</text>
  <text x="118" y="590" fill="#333" font-family="Georgia, 'Times New Roman', serif" font-size="31">It is my pleasure to recommend Mr. Swe Ching Maio.</text>
  <text x="118" y="650" fill="#333" font-family="Georgia, 'Times New Roman', serif" font-size="31">I had the privilege of teaching him in Advanced Analytics</text>
  <text x="118" y="710" fill="#333" font-family="Georgia, 'Times New Roman', serif" font-size="31">with Excel, and mentoring him was a rewarding experience.</text>
  <rect x="118" y="800" width="964" height="250" rx="16" fill="#fff4f4" stroke="#f1caca" stroke-width="2"/>
  <text x="158" y="875" fill="#111" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700">"His resilience and refusal to give up were</text>
  <text x="158" y="935" fill="#111" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700">truly admirable qualities that never wavered</text>
  <text x="158" y="995" fill="#111" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700">throughout the course."</text>
  <text x="118" y="1145" fill="#333" font-family="Georgia, 'Times New Roman', serif" font-size="31">Sincerely,</text>
  <text x="118" y="1210" fill="#111" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700">Vasista Turlapati</text>
  <text x="118" y="1255" fill="#555" font-family="Arial, Helvetica, sans-serif" font-size="25">Adjunct Professor (Information Systems)</text>
  <text x="118" y="1295" fill="#555" font-family="Arial, Helvetica, sans-serif" font-size="25">Mahindra University School of Management</text>
  <text x="118" y="1390" fill="#e50914" font-family="Arial, Helvetica, sans-serif" font-size="23">vasista.turlapati@mahindrauniversity.edu.in</text>
